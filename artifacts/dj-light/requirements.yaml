    aspect_ratio: "1:1"
  - path: "artifacts/dj-light/public/images/mix-4.png"
    description: "Abstract neon laser grid tunnel, retro outrun synthwave style, dark vibrant"
    aspect_ratio: "1:1"
  - path: "artifacts/dj-light/public/images/mix-5.png"
    description: "Glowing neon palm trees synthwave style, dark moody sunset, orange and teal"
    aspect_ratio: "1:1"
